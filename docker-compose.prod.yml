services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: google-finance-api:latest
    container_name: googlefinance-api
    restart: unless-stopped
    ports:
      - 127.0.0.1:${API_HOST_PORT:-5016}:8080
    environment:
      PORT: "8080"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 64M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      backend:
        aliases:
          - googlefinance-api

networks:
  backend:
    name: ${TRACK_BACKEND_NETWORK:-stockpeekr-backend}
    external: true
